<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Marco - SUDHUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        canvas { max-width: 100%; height: auto; border-radius: 15px; display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen font-sans">

<nav class="bg-blue-900 text-white p-4 shadow-md sticky top-0 z-50">
    <div class="max-w-4xl mx-auto flex justify-between items-center gap-4">
        
        <a href="index.html" 
           class="group flex items-center gap-3 bg-white/10 hover:bg-white hover:text-blue-900 px-4 py-2 rounded-xl border border-white/20 transition-all duration-300 font-bold shadow-lg">
            
            <i data-lucide="clock" class="w-5 h-5 group-hover:rotate-12 transition-transform"></i> 
            
            <span class="text-sm md:text-base tracking-tight">
                Contador del incumplimiento
            </span>
        </a>

        <div class="flex flex-col items-end text-right">
            <span class="font-black text-xs md:text-lg leading-none tracking-tight uppercase">
                Frente Sindical, Estudiantil y de Graduados UNAHUR
            </span>
            <span class="text-[10px] text-blue-300 uppercase tracking-widest font-bold mt-1 hidden md:block">
                #UniversidadPública
            </span>
        </div>

    </div>
</nav>

    <main class="max-w-xl mx-auto px-4 py-12 text-center">
        <div class="bg-white rounded-[2rem] p-8 shadow-2xl border border-slate-200">
            <h1 class="text-3xl font-black text-slate-900 mb-2">Sumate a la Marcha</h1>
            <p class="text-slate-500 mb-8 font-medium">Seleccioná tu foto y descargá tu avatar con el marco oficial.</p>
            
            <div class="space-y-6">
                <label class="cursor-pointer block">
                    <div class="bg-blue-50 border-2 border-dashed border-blue-200 hover:border-blue-500 rounded-2xl p-10 transition-all group">
                        <div class="bg-blue-600 text-white w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                            <i data-lucide="image-plus"></i>
                        </div>
                        <span class="text-blue-700 font-bold text-lg">Elegir mi Foto</span>
                        <input type="file" id="upload" accept="image/*" class="hidden">
                    </div>
                </label>

                <div id="status" class="text-red-500 font-bold text-sm"></div>
                
                <canvas id="canvas" width="800" height="1066" class="mx-auto shadow-2xl"></canvas>
                
                <a id="downloadBtn" style="display: none;" class="w-full bg-green-600 hover:bg-green-700 text-white text-center py-5 rounded-2xl font-black text-xl shadow-xl transition-all hover:scale-[1.02] flex items-center justify-center gap-2">
                    <i data-lucide="download"></i> DESCARGAR MI AVATAR
                </a>
            </div>
        </div>
    </main>

    <script src="script-lucha.js"></script>
</body>
</html>
